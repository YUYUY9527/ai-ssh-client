name: Release

on:
  push:
    tags:
      - "v*"

# tauri-action needs to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build and publish (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Uses the pushed tag (e.g. v1.0.0) as the release tag/name.
          tagName: ${{ github.ref_name }}
          releaseName: "AI SSH Client ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
