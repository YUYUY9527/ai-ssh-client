appId: com.aisshclient.app
productName: AI SSH Client
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

extraResources:
  - from: build
    to: build
    filter:
      - icon.ico
      - icon-1024.png
      - icon.svg

win:
  target:
    - nsis
    - portable
  icon: build/icon

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

portable:
  artifactName: AI-SSH-Client-portable.exe
